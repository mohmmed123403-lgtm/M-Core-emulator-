<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Core Web 👑</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
    <style>
        :root { --main: #00ff41; --bg: #0d0d0d; --bar: #1f1f1f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .title-bar {
            background: var(--bar); color: var(--main); padding: 6px 12px;
            font-size: 13px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333;
        }
        .browser-bar {
            background: var(--bar); padding: 8px; display: flex; gap: 8px;
            border-bottom: 2px solid var(--main);
        }
        .nav-btn {
            background: #333; color: var(--main); border: 1px solid #444;
            width: 35px; height: 35px; cursor: pointer; font-size: 16px; border-radius: 4px;
        }
        .nav-btn:hover { background: var(--main); color: #000; }
        #urlInput {
            flex: 1; padding: 0 12px; background: #111; border: 1px solid #444;
            color: var(--main); font-size: 15px; outline: none; border-radius: 4px;
        }
        #urlInput:focus { border-color: var(--main); box-shadow: 0 0 10px var(--main); }
        #goBtn {
            background: var(--main); color: #000; border: none; padding: 0 20px;
            font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        #goBtn:hover { background: #fff; }
        #viewFrame { flex: 1; width: 100%; border: none; background: #fff; }
        #status { background: var(--bar); color: #888; padding: 4px 12px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="title-bar">
        <span>M-Core Web v1.0 - أسرع متصفح في الكون</span>
        <span id="clock"></span>
    </div>
    
    <div class="browser-bar">
        <button class="nav-btn" onclick="goBack()" title="رجوع">◀
